version: '3.8'

services:
  app:
    build: .
    container_name: contentpulse-backend
    restart: unless-stopped
    ports:
      - "80:8000"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - contentpulse

networks:
  contentpulse:
    driver: bridge
